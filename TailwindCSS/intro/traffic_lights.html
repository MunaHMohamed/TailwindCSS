<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traffic Lights</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-slate-900">

  <!-- Traffic Light -->
  <div class="flex flex-col gap-5 bg-zinc-800 p-5 rounded-3xl shadow-2xl border border-zinc-700">

    <!-- Red -->
    <div id="red"
      class="w-24 h-24 rounded-full bg-red-900 transition-all duration-500">
    </div>

    <!-- Yellow -->
    <div id="yellow"
      class="w-24 h-24 rounded-full bg-yellow-900 transition-all duration-500">
    </div>

    <!-- Green -->
    <div id="green"
      class="w-24 h-24 rounded-full bg-green-900 transition-all duration-500">
    </div>

  </div>

  <script>
    const lights = [
      {
        el: document.getElementById("red"),
        on: "bg-red-500 shadow-[0_0_40px_rgba(239,68,68,0.95)]",
        off: "bg-red-900"
      },
      {
        el: document.getElementById("yellow"),
        on: "bg-yellow-400 shadow-[0_0_40px_rgba(250,204,21,0.95)]",
        off: "bg-yellow-900"
      },
      {
        el: document.getElementById("green"),
        on: "bg-green-500 shadow-[0_0_40px_rgba(34,197,94,0.95)]",
        off: "bg-green-900"
      }
    ];

    let current = 0;

    function turnOffAll() {
      lights.forEach(light => {
        light.el.className =
          `w-24 h-24 rounded-full transition-all duration-500 ${light.off}`;
      });
    }

    function runTrafficLight() {
      turnOffAll();

      const light = lights[current];

      light.el.className =
        `w-24 h-24 rounded-full transition-all duration-500 ${light.on}`;

      current = (current + 1) % lights.length;
    }

    // Start immediately
    runTrafficLight();

    // Change every 2 seconds
    setInterval(runTrafficLight, 2000);
  </script>

</body>
</html>
